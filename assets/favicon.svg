<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#59ff99" />
      <stop offset="50%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff2ebb" />
    </linearGradient>
  </defs>

  <!-- Background Squircle -->
  <rect x="12" y="12" width="488" height="488" rx="120" fill="#0d0e15" stroke="url(#border-grad)" stroke-width="16" />

  <!-- Terminal Grid / Scanline subtle effect inside background -->
  <g opacity="0.15">
    <line x1="12" y1="80" x2="500" y2="80" stroke="#59ff99" stroke-width="4" />
    <line x1="12" y1="160" x2="500" y2="160" stroke="#59ff99" stroke-width="4" />
    <line x1="12" y1="240" x2="500" y2="240" stroke="#59ff99" stroke-width="4" />
    <line x1="12" y1="320" x2="500" y2="320" stroke="#59ff99" stroke-width="4" />
    <line x1="12" y1="400" x2="500" y2="400" stroke="#59ff99" stroke-width="4" />
  </g>

  <!-- Prompt ">" -->
  <path d="M 75,180 L 145,256 L 75,332" 
        stroke="#00f0ff" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow-cyan)" />

  <!-- Monogram "H" -->
  <path d="M 190,140 H 235 V 226 H 295 V 140 H 340 V 372 H 295 V 286 H 235 V 372 H 190 Z" 
        fill="#59ff99" 
        filter="url(#glow-green)" />

  <!-- Blinking Cursor "_" -->
  <rect x="375" y="336" width="65" height="32" rx="6" 
        fill="#ff2ebb" 
        filter="url(#glow-magenta)" />
</svg>
